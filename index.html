// Load persisted state from localStorage or initialize fresh
function loadState() {
  try {
    const saved = localStorage.getItem('ppp_state_pilot');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}
const _saved = loadState();
const accountability = _saved ? _saved.accountability : {};
const notes = _saved ? _saved.notes : {};
const completion = _saved ? _saved.completion : new Array(11).fill(0);

function persistState() {
  try {
    localStorage.setItem('ppp_state_pilot', JSON.stringify({ accountability, notes, completion }));
  } catch(e) {}
}

const cv = document.getElementById('c');
const c = cv.getContext('2d');
const W=700,CX=350,CY=350,OR=330,IR=122,SLICE=36,GAP=1.2;

function rad(d){ return d*Math.PI/180; }

function drawSlice(s, i){
  const a1=rad(s.startDeg+GAP), a2=rad(s.startDeg+SLICE-GAP);
  c.beginPath();
  c.moveTo(CX+IR*Math.cos(a1),CY+IR*Math.sin(a1));
  c.arc(CX,CY,OR,a1,a2);
  c.arc(CX,CY,IR,a2,a1,true);
  c.closePath();
  c.fillStyle=s.color;
  c.fill();

  const pct = completion[i] / 100;
  if(pct > 0){
    const fillR = IR + (OR - IR) * pct;
    const grad = c.createRadialGradient(CX,CY,IR,CX,CY,OR);
    grad.addColorStop(0, 'rgba(255,255,255,0.55)');
    grad.addColorStop(pct*0.85, 'rgba(255,255,255,0.25)');
    grad.addColorStop(pct, 'rgba(255,255,255,0)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    c.beginPath();
    c.moveTo(CX+IR*Math.cos(a1),CY+IR*Math.sin(a1));
    c.arc(CX,CY,fillR,a1,a2);
    c.arc(CX,CY,IR,a2,a1,true);
    c.closePath();
    c.fillStyle=grad;
    c.fill();
    c.beginPath();
    c.arc(CX,CY,fillR,a1,a2);
    c.lineWidth=2;
    c.strokeStyle='rgba(255,255,255,0.7)';
    c.stroke();
  }
}

function drawText(s){
  const amid=rad(s.startDeg+SLICE/2);
  const MR=(OR+IR)/2;
  const tx=CX+MR*Math.cos(amid);
  const ty=CY+MR*Math.sin(amid);
  const isLight=s.color==='#c4a96a';
  const tc=isLight?'#2e2a14':'#f4efe0';
  const nameLines=s.name.split('\n');
  const allLines=[...nameLines,...s.bullets];
  const lineH=14;
  const totalH=allLines.length*lineH+4;
  c.textAlign='center'; c.textBaseline='middle';
  let startY=ty-totalH/2;
  nameLines.forEach((line,i)=>{
    c.font='bold 12px Georgia,serif'; c.fillStyle=tc;
    c.fillText(line,tx,startY+i*lineH+lineH/2);
  });
  startY+=nameLines.length*lineH+4;
  s.bullets.forEach((line,i)=>{
    c.font='11px Georgia,serif'; c.fillStyle=tc;
    c.fillText(line,tx,startY+i*lineH+lineH/2);
  });
}

let active=null;

function drawCenter(){
  // Outer white ring (like the poster)
  c.beginPath();
  c.arc(CX,CY,IR-2,0,2*Math.PI);
  c.fillStyle='#ffffff';
  c.fill();

  // Inner cream circle
  const innerR = IR-16;
  c.beginPath();
  c.arc(CX,CY,innerR,0,2*Math.PI);
  c.fillStyle='#f5f0e8';
  c.fill();

  // Completion fill for center — fills bottom to top
  const pct = completion[10] / 100;
  if(pct > 0){
    // The filled band: from bottom of circle up by pct
    const topY = CY + innerR;           // bottom of circle (y increases downward)
    const fillHeight = 2 * innerR * pct;
    const fillTopY = topY - fillHeight; // top edge of the filled region

    // Clip to the circle so fill doesn't bleed outside
    c.save();
    c.beginPath();
    c.arc(CX, CY, innerR, 0, 2 * Math.PI);
    c.clip();

    // Linear gradient fading upward (matches slice shading feel)
    const grad = c.createLinearGradient(CX, topY, CX, fillTopY);
    grad.addColorStop(0,    'rgba(120,120,120,0.55)');
    grad.addColorStop(0.6,  'rgba(120,120,120,0.25)');
    grad.addColorStop(1,    'rgba(120,120,120,0.05)');

    c.fillStyle = grad;
    c.fillRect(CX - innerR, fillTopY, innerR * 2, fillHeight);

    // Horizontal line at the fill level (matches the arc stroke on slices)
    c.beginPath();
    c.moveTo(CX - innerR, fillTopY);
    c.lineTo(CX + innerR, fillTopY);
    c.lineWidth = 2;
    c.strokeStyle = 'rgba(255,255,255,0.7)';
    c.stroke();

    c.restore();
  }

  // Subtle inner ring border
  c.beginPath();
  c.arc(CX,CY,innerR,0,2*Math.PI);
  c.lineWidth=1;
  c.strokeStyle='rgba(58,50,34,0.12)';
  c.stroke();

  // Logo — sized to sit nicely in upper portion of circle
  const logoSize = 82;
  const logoX = CX - logoSize / 2;
  const textBlockH = 21 * 3; // 3 lines of text
  const totalH = logoSize + 8 + textBlockH;
  const startY = CY - totalH / 2;
  const logoY = startY;

  if (logoImg.complete && logoImg.naturalWidth > 0) {
    c.drawImage(logoImg, logoX, logoY, logoSize, logoSize);
  }

  // Text below logo
  const textStartY = startY + logoSize + 14;
  ['Pilot','Proven','Process'].forEach((l,i)=>{
    c.font='bold 18px Georgia,serif';
    c.fillStyle='#2e2518';
    c.textAlign='center';
    c.textBaseline='middle';
    c.fillText(l, CX, textStartY + i * 22);
  });
}

function draw(){
  c.clearRect(0,0,W,W);
  SEGS.forEach((s,i)=>drawSlice(s,i));
  SEGS.forEach(s=>drawText(s));
  drawCenter();
}

function saveActive(){
  if(active!==null){
    accountability[active]=document.getElementById('accountability-box').value;
    notes[active]=document.getElementById('notes-box').value;
    completion[active]=parseInt(document.getElementById('completion-slider').value);
    persistState();
  }
}

function showDetail(idx, seg, titleOverride){
  saveActive();
  active=idx;
  draw();

  document.getElementById('wheel-view').style.display='none';
  const dv=document.getElementById('detail-view');
  dv.style.display='block';
  dv.style.borderTop='5px solid '+seg.color;
  document.getElementById('back').style.background=seg.color;

  const displayTitle = titleOverride || seg.name.replace('\n',' ');
  document.getElementById('dtitle').textContent=displayTitle;
  document.getElementById('dtitle').style.color=seg.color;

  const sl=document.getElementById('completion-slider');
  sl.value=completion[idx];
  document.getElementById('completion-val').textContent=completion[idx]+'%';
  document.getElementById('accountability-box').value=accountability[idx]||'';
  document.getElementById('notes-box').value=notes[idx]||'';

  let html='';
  seg.subs.forEach(sub=>{
    html+=`<div class="sub"><div class="subname">${sub.name}</div>`;
    if(sub.items && sub.items.length){
      html+=`<ul class="subitems">`;
      sub.items.forEach(it=>{
        if(typeof it === 'string'){
          html+=`<li>${it}</li>`;
        } else {
          html+='<li>'+it.name+'<ul class="subitems subitems-nested">'+it.subitems.map(s=>'<li>'+s+'</li>').join('')+'</ul></li>';
        }
      });
      html+=`</ul>`;
    } else {
      html+=`<p class="noitem">No checklist items yet</p>`;
    }
    html+=`</div>`;
  });
  document.getElementById('dcontent').innerHTML=html;
}

document.getElementById('completion-slider').addEventListener('input',e=>{
  const v=parseInt(e.target.value);
  document.getElementById('completion-val').textContent=v+'%';
  if(active!==null){ completion[active]=v; draw(); persistState(); }
});

document.getElementById('accountability-box').addEventListener('input',()=>{
  if(active!==null){ accountability[active]=document.getElementById('accountability-box').value; persistState(); }
});

document.getElementById('notes-box').addEventListener('input',()=>{
  if(active!==null){ notes[active]=document.getElementById('notes-box').value; persistState(); }
});

cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect(), sc=700/r.width;
  const x=(e.clientX-r.left)*sc, y=(e.clientY-r.top)*sc;
  const dx=x-CX, dy=y-CY, d=Math.sqrt(dx*dx+dy*dy);

  // Center circle click
  if(d < IR-5){
    showDetail(10, CENTER, CENTER.sectionTitle);
    return;
  }

  if(d>OR) return;

  let ang=(Math.atan2(dy,dx)*180/Math.PI+360)%360;
  const idx=SEGS.findIndex(s=>{
    let start=(s.startDeg+360)%360, end=(start+SLICE)%360;
    if(start<end) return ang>=start&&ang<end;
    return ang>=start||ang<end;
  });
  if(idx<0) return;
  showDetail(idx, SEGS[idx]);
});

document.getElementById('back').addEventListener('click',()=>{
  saveActive();
  active=null;
  document.getElementById('detail-view').style.display='none';
  document.getElementById('wheel-view').style.display='block';
  draw();
});

draw();
</script>
</body>
</html>
